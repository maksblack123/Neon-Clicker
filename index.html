<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Неоновый Кликер: Hardcore Edition (Enchanced)</title>
    <style>
        :root {
            --cursor-svg: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 28 28'><path d='M3 2 L10 25 L14 16 L23 12 Z' fill='%2300ffff' stroke='%23ffffff' stroke-width='1.5' stroke-linejoin='round'/></svg>");
            --text-color: #ffffff;
            --accent-color: #00ffff;
            --cookie-color: #ffd700;
            --energy-color: #0088ff;
            --auto-color: #a855f7;
            --panel-bg: rgba(5, 5, 10, 0.98);
            --circle-gradient: linear-gradient(135deg, #00ffff, #0088ff, #00ccff, #0055ff, #00ffff);
        }

        body {
            margin: 0; padding: 0;
            background: var(--circle-gradient);
            background-size: 600% 600%;
            animation: bgGradientMove 20s ease-in-out infinite;
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            user-select: none;
            cursor: var(--cursor-svg), auto;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 0;
        }

        @keyframes bgGradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .particle { position: absolute; font-size: 1.5rem; opacity: 0; animation: floatUp linear infinite; }
        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            20% { opacity: 0.25; }
            80% { opacity: 0.25; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .stats-top { position: absolute; top: 6%; display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; z-index: 10; max-width: 90%; }
        .stat-box { text-align: center; }
        .stat-label { font-size: 0.8rem; color: #ccc; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .stat-value { font-size: 3rem; font-weight: 900; filter: drop-shadow(0 0 12px currentColor); }
        .clicks-val { color: var(--accent-color); }
        .cookies-val { color: var(--cookie-color); }
        .energy-val { color: var(--energy-color); }
        .auto-val { color: var(--auto-color); font-size: 2.2rem; }

        .game-area { position: relative; width: 500px; height: 500px; display: flex; align-items: center; justify-content: center; z-index: 5; }
        
        .main-circle {
            position: relative; width: 260px; height: 260px; border-radius: 50%;
            background: var(--circle-gradient);
            background-size: 400% 400%; animation: bgGradientMove 8s linear infinite;
            box-shadow: 0 0 70px var(--accent-color); border: 4px solid rgba(255, 255, 255, 0.4);
            z-index: 10; transition: transform 0.05s; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .main-circle:active { transform: scale(0.92); }

        .gemini-star {
            width: 140px;
            height: 140px;
            fill: #fff;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.8));
            animation: starPulse 4s ease-in-out infinite;
        }

        @keyframes starPulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.1); opacity: 1; filter: drop-shadow(0 0 25px rgba(255, 255, 255, 1)); }
        }

        .orbit-container { position: absolute; top: 50%; left: 50%; width: 0; height: 0; z-index: 5; animation: globalRotation 25s linear infinite; }
        @keyframes globalRotation { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .cursor-wrapper { position: absolute; width: 0; height: 0; transform-origin: center center; }
        .orbit-cursor { position: absolute; width: 30px; height: 30px; transform: translate(-50%, -50%) rotate(315deg); filter: drop-shadow(0 0 8px var(--accent-color)); pointer-events: none; }

        .progress-stack { position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 20; width: 440px; }
        .progress-wrapper {
            display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.85);
            padding: 10px 20px; border-radius: 25px; backdrop-filter: blur(15px);
            opacity: 0; transition: 0.5s; pointer-events: none; border: 1px solid rgba(255,255,255,0.15);
        }
        .progress-wrapper.active { opacity: 1; pointer-events: all; }
        .timer-text { font-family: 'Courier New', monospace; font-weight: 800; font-size: 0.95rem; min-width: 120px; text-align: center; white-space: nowrap; }
        .progress-container { flex: 1; height: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; transition: width 0.15s linear; }
        .bar-cookie { background: linear-gradient(90deg, #ffd700, #ffaa00); }
        .bar-energy { background: linear-gradient(90deg, #00d2ff, #3a7bd5); }

        .menu-btn { position: absolute; bottom: 40px; right: 40px; padding: 18px 36px; background: rgba(0,0,0,0.7); color: #fff; border: 2px solid var(--accent-color); border-radius: 50px; font-weight: 800; z-index: 50; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 1rem; letter-spacing: 1px; }
        .menu-btn:hover { background: var(--accent-color); color: #000; box-shadow: 0 0 30px var(--accent-color); transform: translateY(-3px); }

        .upgrades-panel {
            position: absolute; top: 0; right: -100%; width: 420px; height: 100vh;
            background: var(--panel-bg); box-shadow: -15px 0 50px rgba(0,0,0,0.95); z-index: 100;
            transition: right 0.5s cubic-bezier(0.19, 1, 0.22, 1); display: flex; flex-direction: column; padding: 30px; backdrop-filter: blur(25px); border-left: 2px solid rgba(0, 255, 255, 0.3);
        }
        .upgrades-panel.open { right: 0; }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: rgba(255,255,255,0.08); color: #999; border-radius: 12px; cursor: pointer; font-weight: 800; transition: 0.3s; font-size: 0.85rem; text-transform: uppercase; }
        .tab-btn.active { background: var(--accent-color); color: #000; }
        .tab-btn.active.cookie-tab { background: var(--cookie-color); }
        .tab-btn.active.energy-tab { background: var(--energy-color); }

        .upgrades-list { flex: 1; overflow-y: auto; padding-right: 8px; margin-bottom: 15px; }
        
        .upgrade-card { 
            background: rgba(255, 255, 255, 0.04); border-radius: 18px; padding: 15px; margin-bottom: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.4s;
            position: relative; overflow: hidden;
        }
        .upgrade-card.disabled {
            filter: grayscale(1) brightness(0.6);
            opacity: 0.45;
        }
        
        .card-title { display: flex; justify-content: space-between; font-size: 0.95rem; font-weight: 800; text-transform: uppercase; }
        .title-clicks { color: var(--accent-color); }
        .title-cookies { color: var(--cookie-color); }
        .title-energy { color: var(--energy-color); }

        .card-desc { font-size: 0.8rem; color: #ccc; margin: 6px 0 12px 0; line-height: 1.3; }

        .purchase-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .purchase-progress-bg {
            flex: 1; height: 10px; background: rgba(255,255,255,0.07);
            border-radius: 10px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .purchase-progress-fill {
            height: 100%; width: 0%; transition: width 0.3s ease-out;
            border-radius: 10px;
        }
        .fill-clicks { background: var(--accent-color); box-shadow: 0 0 12px var(--accent-color); }
        .fill-cookies { background: var(--cookie-color); box-shadow: 0 0 12px var(--cookie-color); }
        .fill-energy { background: var(--energy-color); box-shadow: 0 0 12px var(--energy-color); }
        
        .upg-buy-btn {
            width: 50px; height: 50px; border-radius: 14px; border: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-weight: 900; cursor: pointer; transition: 0.2s; 
            background: rgba(255,255,255,0.12); color: #fff;
            text-transform: uppercase;
            flex-shrink: 0;
            padding: 5px;
            overflow: hidden;
        }
        .upg-buy-btn.can-buy {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 15px var(--accent-color);
        }
        .upg-buy-btn.btn-cookies.can-buy { background: var(--cookie-color); box-shadow: 0 0 15px var(--cookie-color); }
        .upg-buy-btn.btn-energy.can-buy { background: var(--energy-color); box-shadow: 0 0 15px var(--energy-color); color: #fff; }
        
        .buy-price { 
            font-size: 0.95rem; 
            line-height: 1.1; 
            text-align: center; 
            white-space: nowrap; 
            letter-spacing: -0.3px;
        }
        .buy-price.long-number { font-size: 0.75rem; }
        .buy-price.max-text { font-size: 0.85rem; font-weight: 900; }

        .pagination { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin-top: 5px; 
            padding: 10px 0 30px 0; 
            border-top: 1px solid rgba(255,255,255,0.1); 
        }
        .page-btn {
            width: 42px; height: 42px; border-radius: 12px; border: 2px solid rgba(0, 255, 255, 0.3);
            background: transparent; color: #fff; font-weight: 800; font-size: 1rem; cursor: pointer;
            transition: 0.3s;
        }
        .page-btn:hover { border-color: var(--accent-color); background: rgba(0, 255, 255, 0.1); }
        .page-btn.active { background: var(--accent-color); color: #000; box-shadow: 0 0 20px var(--accent-color); border-color: var(--accent-color); }

        .floating-text { position: fixed; pointer-events: none; z-index: 1000; font-weight: 900; font-size: 2.2rem; animation: floatText 0.8s ease-out forwards; text-shadow: 0 0 15px currentColor; }
        @keyframes floatText { 0% { transform: translateY(0) scale(1.3); opacity: 1; } 100% { transform: translateY(-150px) scale(1); opacity: 0; } }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 255, 255, 0.4); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="bg-particles" id="bg-particles"></div>

    <div class="stats-top">
        <div class="stat-box">
            <div class="stat-label">Клики</div>
            <div class="stat-value clicks-val" id="clicks-display">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Авто-доход</div>
            <div class="stat-value auto-val" id="auto-display">0/сек</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Печеньки</div>
            <div class="stat-value cookies-val" id="cookies-display">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Энергия</div>
            <div class="stat-value energy-val" id="energy-display">0</div>
        </div>
    </div>

    <div class="game-area">
        <div class="orbit-container" id="orbit-center"></div>
        <div class="main-circle" id="main-circle" onmousedown="handleClick(event)" ontouchstart="handleClick(event)">
            <svg class="gemini-star" viewBox="0 0 24 24">
                <path d="M12,2L14.5,9.5L22,12L14.5,14.5L12,22L9.5,14.5L2,12L9.5,9.5L12,2Z" />
            </svg>
        </div>
    </div>

    <div class="progress-stack">
        <div class="progress-wrapper" id="energy-progress-wrapper">
            <div class="timer-text energy-val" id="energy-timer-text">0/100</div>
            <div class="progress-container"><div class="progress-bar bar-energy" id="energy-progress-bar"></div></div>
        </div>
        <div class="progress-wrapper" id="cookie-progress-wrapper">
            <div class="timer-text cookies-val" id="cookie-timer-text">0/500 (+1 🍪)</div>
            <div class="progress-container"><div class="progress-bar bar-cookie" id="cookie-progress-bar"></div></div>
        </div>
    </div>

    <button class="menu-btn" onclick="toggleMenu()">Магазин</button>

    <div class="upgrades-panel" id="upgrades-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h3 id="menu-title" style="margin:0; color:var(--accent-color); text-transform:uppercase; letter-spacing:3px; font-size: 1.4rem;">Магазин</h3>
            <button onclick="toggleMenu()" style="background:none; border:none; color:#ff4444; font-size:2.5rem; cursor:pointer; line-height:1;">&times;</button>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" id="tab-clicks" onclick="switchTab('clicks', this)">Прокачка</button>
            <button class="tab-btn" id="tab-cookies" onclick="switchTab('cookies', this)">Пекарня</button>
            <button class="tab-btn" id="tab-energy" onclick="switchTab('energy', this)">Энергия</button>
        </div>

        <div class="upgrades-list" id="upgrades-list"></div>

        <div class="pagination" id="upgrade-pagination">
            <button class="page-btn active" onclick="changePage(1)">1</button>
            <button class="page-btn" onclick="changePage(2)">2</button>
            <button class="page-btn" onclick="changePage(3)">3</button>
        </div>
    </div>

    <script>
        let state = {
            clicks: 0,
            cookies: 0,
            energy: 0,
            currentTab: 'clicks',
            currentPage: 1,
            isMenuOpen: false,
            clickCountForCookie: 0,
            clickCountForEnergy: 0,
            autoIncomePerSec: 0,
            clickUpgrades: [
                // Page 1
                { id: 'c1', name: 'Сила клика', desc: 'Добавляет +1 к силе нажатия.', base: 15, step: 25, lvl: 0, max: 100, page: 1 },
                { id: 'c2', name: 'Авто-курсоры', desc: 'Авто-нажатия (+0.5/сек за шт).', base: 50, step: 50, lvl: 0, max: 50, page: 1 },
                { id: 'c1_2', name: 'Смазка курсора', desc: 'Ускоряет авто-курсоры на 20%.', base: 150, step: 200, lvl: 0, max: 20, page: 1 },
                { id: 'cp', name: 'Активатор: Печенька', desc: 'Открывает сбор печенья.', base: 500, step: 0, lvl: 0, max: 1, page: 1 },
                { id: 'c2x', name: 'Двойная сила', desc: 'Удваивает бонус силы клика.', base: 350, step: 100, lvl: 0, max: 50, page: 1 },
                { id: 'cc', name: 'Мастер-кондитер', desc: 'Больше печенек за цикл.', base: 500, step: 150, lvl: 0, max: 50, page: 1 },
                { id: 'c_ext1', name: 'Макрос клика', desc: 'Авто-курсоры приносят +1/сек.', base: 800, step: 1200, lvl: 0, max: 10, page: 1 },
                { id: 'ce', name: 'Активатор: Энергия', desc: 'Открывает сбор энергии.', base: 1500, step: 0, lvl: 0, max: 1, page: 1 },
                
                // Page 2
                { id: 'c2_1', name: 'Квантовый клик', desc: 'Сразу +10 к силе клика.', base: 3000, step: 750, lvl: 0, max: 50, page: 2 },
                { id: 'c2_2', name: 'Нейро-кликер', desc: 'Быстрый автодоход (+5/сек).', base: 6000, step: 1500, lvl: 0, max: 30, page: 2 },
                { id: 'c_ext2', name: 'Облачный клик', desc: 'Доход авто-курсоров x1.5.', base: 10000, step: 15000, lvl: 0, max: 5, page: 2 },
                { id: 'c2_4', name: 'Сингулярность', desc: 'Общий множитель всего x1.2.', base: 25000, step: 15000, lvl: 0, max: 5, page: 2 },
                { id: 'c3', name: 'Критический Клик', desc: 'Шанс на x5 силу клика.', base: 2500, step: 800, lvl: 0, max: 20, page: 2 },
                { id: 'c_ext3', name: 'Вирусный клик', desc: 'Авто-доход растет от энергии.', base: 15000, step: 20000, lvl: 0, max: 5, page: 2 },
                { id: 'c_ext4', name: 'Гипер-скорость', desc: 'Все авто-клики в 2 раза чаще.', base: 50000, step: 100000, lvl: 0, max: 3, page: 2 },

                // Page 3 (New Custom Upgrades Added)
                { id: 'c3_1', name: 'Смена Реальности', desc: 'Каждый клик дает +1% к шансу Крита.', base: 100000, step: 50000, lvl: 0, max: 10, page: 3 },
                { id: 'c3_2', name: 'Темная Материя', desc: 'Авто-клики приносят в 10 раз больше.', base: 250000, step: 150000, lvl: 0, max: 5, page: 3 },
                { id: 'c3_3', name: 'Хроносдвиг', desc: 'Циклы печенья и энергии в 2 раза короче.', base: 500000, step: 500000, lvl: 0, max: 3, page: 3 },
                { id: 'c3_multi', name: 'Энерго-Выпечка', desc: 'Каждая печенька увеличивает доход энергии на +2%.', base: 350000, step: 250000, lvl: 0, max: 5, page: 3 },
                { id: 'c3_storm', name: 'Песочный Шторм', desc: 'Авто-клики имеют 5% шанс вызвать дождь печенек.', base: 450000, step: 350000, lvl: 0, max: 3, page: 3 },
                { id: 'c3_pulse', name: 'Пульс Эфира', desc: 'Сила клика увеличивается в 2 раза за каждые 100 энергии.', base: 750000, step: 1000000, lvl: 0, max: 3, page: 3 },
                { id: 'c3_core', name: 'Ядро Кондитера', desc: 'Печеньки приносят авто-клики (+50/сек).', base: 1500000, step: 1000000, lvl: 0, max: 5, page: 3 },
                { id: 'c3_4', name: 'Кликер-Бог', desc: 'Сила клика x100 (Абсолют).', base: 5000000, step: 0, lvl: 0, max: 1, page: 3 }
            ],
            cookieUpgrades: [
                { id: 'k1', name: 'Ускоритель', desc: 'Меньше кликов на выпечку.', base: 10, step: 50, lvl: 0, max: 50 },
                { id: 'k2', name: 'Сверх-выпечка', desc: 'Печеньки дают больше дохода.', base: 25, step: 100, lvl: 0, max: 50 },
                { id: 'k_chance', name: 'Крошки при клике', desc: '+1% шанс на 1 печеньку при каждом клике по кругу.', base: 100, step: 150, lvl: 0, max: 20 },
                { id: 'k_lucky', name: 'Счастливая печенька', desc: 'Шанс получить x10 печенек за цикл.', base: 500, step: 500, lvl: 0, max: 10 }
            ],
            energyUpgrades: [
                { id: 'e1', name: 'Перегрузка', desc: 'Больше энергии за цикл.', base: 30, step: 75, lvl: 0, max: 20 },
                { id: 'e5', name: 'Сверхпроводник', desc: 'Доходы всех валют x1.15.', base: 600, step: 500, lvl: 0, max: 5 },
                { id: 'e_chance', name: 'Искра клика', desc: '+1% шанс получить 1 энергию при клике по кругу.', base: 200, step: 250, lvl: 0, max: 20 },
                { id: 'e_battery', name: 'Мега-аккумулятор', desc: 'Удваивает максимальный бонус энергии.', base: 1000, step: 1500, lvl: 0, max: 5 }
            ]
        };

        const clicksEl = document.getElementById('clicks-display');
        const autoEl = document.getElementById('auto-display');
        const cookiesEl = document.getElementById('cookies-display');
        const energyEl = document.getElementById('energy-display');
        const listEl = document.getElementById('upgrades-list');
        const paginationEl = document.getElementById('upgrade-pagination');
        
        const cProgressEl = document.getElementById('cookie-progress-bar');
        const cTimerEl = document.getElementById('cookie-timer-text');
        const cWrapperEl = document.getElementById('cookie-progress-wrapper');

        const eProgressEl = document.getElementById('energy-progress-bar');
        const eTimerEl = document.getElementById('energy-timer-text');
        const eWrapperEl = document.getElementById('energy-progress-wrapper');

        let autoInterval;

        function toggleMenu() { 
            state.isMenuOpen = !state.isMenuOpen;
            document.getElementById('upgrades-panel').classList.toggle('open'); 
            if(state.isMenuOpen) renderUpgrades();
        }
        
        function switchTab(tab, btn) {
            state.currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'cookie-tab', 'energy-tab'));
            btn.classList.add('active');
            if(tab === 'cookies') btn.classList.add('cookie-tab');
            if(tab === 'energy') btn.classList.add('energy-tab');
            
            paginationEl.style.display = (tab === 'clicks') ? 'flex' : 'none';
            renderUpgrades();
        }

        function changePage(p) {
            state.currentPage = p;
            document.querySelectorAll('.page-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', (idx + 1) === p);
            });
            renderUpgrades();
        }

        const getCost = (u) => Math.floor(u.base + (u.step || 0) * u.lvl);
        
        const getRequiredCookieClicks = () => {
            let baseReq = 500 - (state.cookieUpgrades[0].lvl * 5);
            let chrono = state.clickUpgrades.find(u => u.id === 'c3_3').lvl;
            if(chrono > 0) baseReq /= Math.pow(2, chrono);
            return Math.max(10, baseReq);
        };

        const getRequiredEnergyClicks = () => {
            let baseReq = 100 - (state.energyUpgrades[0].lvl * 2);
            let chrono = state.clickUpgrades.find(u => u.id === 'c3_3').lvl;
            if(chrono > 0) baseReq /= Math.pow(2, chrono);
            return Math.max(5, baseReq);
        };

        function getTotalCookieGain() {
            let gain = 1;
            const upg = state.clickUpgrades.find(u => u.id === 'cc');
            if(upg) gain += upg.lvl;
            const lucky = state.cookieUpgrades.find(u => u.id === 'k_lucky').lvl;
            if(Math.random() < lucky * 0.05) gain *= 10;
            return gain;
        }

        function updateStats() {
            clicksEl.innerText = Math.floor(state.clicks).toLocaleString();
            cookiesEl.innerText = Math.floor(state.cookies).toLocaleString();
            energyEl.innerText = Math.floor(state.energy).toLocaleString();
            
            let lvl = state.clickUpgrades.find(u => u.id === 'c2').lvl;
            let neuroLvl = state.clickUpgrades.find(u => u.id === 'c2_2').lvl;
            let ext1 = state.clickUpgrades.find(u => u.id === 'c_ext1').lvl;
            let speedMult = 1 + (state.clickUpgrades.find(u => u.id === 'c1_2').lvl * 0.2);
            let cloudMult = Math.pow(1.5, state.clickUpgrades.find(u => u.id === 'c_ext2').lvl);
            let hyperMult = Math.pow(2, state.clickUpgrades.find(u => u.id === 'c_ext4').lvl);
            let darkMatter = Math.pow(10, state.clickUpgrades.find(u => u.id === 'c3_2').lvl);
            let globalMult = Math.pow(1.15, state.energyUpgrades[1].lvl) * Math.pow(1.2, state.clickUpgrades.find(u => u.id === 'c2_4').lvl);
            
            let incomePerSec = ((lvl * (0.5 + ext1)) + (neuroLvl * 5)) * speedMult * cloudMult * hyperMult * darkMatter * globalMult;
            
            // Custom P3: Virus (Energy-based auto)
            let virus = state.clickUpgrades.find(u => u.id === 'c_ext3').lvl;
            if(virus > 0) incomePerSec += (state.energy * virus * 0.1);

            // Custom P3: Baker's Core (Cookie-based auto)
            let core = state.clickUpgrades.find(u => u.id === 'c3_core').lvl;
            if(core > 0) incomePerSec += (state.cookies * core * 50);

            state.autoIncomePerSec = incomePerSec;
            autoEl.innerText = (incomePerSec < 10 ? incomePerSec.toFixed(1) : Math.floor(incomePerSec)) + '/сек';

            if (state.clickUpgrades.find(u => u.id === 'cp').lvl > 0) {
                cWrapperEl.classList.add('active');
                let req = getRequiredCookieClicks();
                let gain = getTotalCookieGain();
                cTimerEl.innerText = `${Math.floor(state.clickCountForCookie)}/${Math.floor(req)} (+${gain} 🍪)`;
                cProgressEl.style.width = Math.min(100, (state.clickCountForCookie / req) * 100) + '%';
            }

            if (state.clickUpgrades.find(u => u.id === 'ce').lvl > 0) {
                eWrapperEl.classList.add('active');
                let req = getRequiredEnergyClicks();
                eTimerEl.innerText = `${Math.floor(state.clickCountForEnergy)}/${Math.floor(req)}`;
                eProgressEl.style.width = Math.min(100, (state.clickCountForEnergy / req) * 100) + '%';
            }
            if(state.isMenuOpen) updateUpgVisuals();
        }

        function updateUpgVisuals() {
            const cards = listEl.querySelectorAll('.upgrade-card');
            cards.forEach(card => {
                const id = card.dataset.id;
                const upg = [...state.clickUpgrades, ...state.cookieUpgrades, ...state.energyUpgrades].find(u => u.id === id);
                const cost = getCost(upg);
                const isMax = upg.lvl >= upg.max;
                let currentCurrency = (state.currentTab === 'clicks' ? state.clicks : (state.currentTab === 'cookies' ? state.cookies : state.energy));
                const percent = isMax ? 100 : Math.min(100, (currentCurrency / cost) * 100);
                const fill = card.querySelector('.purchase-progress-fill');
                if(fill) fill.style.width = percent + '%';
                const btn = card.querySelector('.upg-buy-btn');
                if(btn) {
                    if(!isMax && currentCurrency >= cost) btn.classList.add('can-buy');
                    else btn.classList.remove('can-buy');
                }
                if(!isMax && currentCurrency < cost) card.classList.add('disabled');
                else card.classList.remove('disabled');
            });
        }

        function handleClick(e) {
            if(e) e.preventDefault();
            let basePower = 1 + state.clickUpgrades[0].lvl + (state.clickUpgrades[4].lvl * 2) + (state.clickUpgrades[8].lvl * 10);
            
            // Custom P3: Pulse of Ether (Energy boosts click)
            let pulse = state.clickUpgrades.find(u => u.id === 'c3_pulse').lvl;
            if(pulse > 0) {
                let pulseBonus = Math.pow(2, Math.floor(state.energy / 100) * pulse);
                basePower *= pulseBonus;
            }

            if(state.clickUpgrades.find(u => u.id === 'c3_4').lvl > 0) basePower *= 100;
            
            let mult = Math.pow(1.15, state.energyUpgrades[1].lvl) * Math.pow(1.2, state.clickUpgrades[11].lvl);
            let val = basePower * mult;
            let critChance = (state.clickUpgrades[12].lvl * 0.05) + (state.clickUpgrades.find(u => u.id === 'c3_1').lvl * 0.01);
            let isCrit = Math.random() < critChance;
            if(isCrit) val *= 5;
            state.clicks += val;

            let cookieChance = state.cookieUpgrades.find(u => u.id === 'k_chance').lvl * 0.01;
            if(Math.random() < cookieChance) {
                state.cookies += 1;
                createFloat(window.innerWidth/2, window.innerHeight/3, `+1 🍪`, '#ffd700');
            }

            let energyChance = state.energyUpgrades.find(u => u.id === 'e_chance').lvl * 0.01;
            if(Math.random() < energyChance) {
                state.energy += 1;
                createFloat(window.innerWidth/2, window.innerHeight/3 + 40, `+1 ⚡`, '#00d2ff');
            }

            if (state.clickUpgrades[3].lvl > 0) {
                state.clickCountForCookie++;
                if (state.clickCountForCookie >= getRequiredCookieClicks()) {
                    state.clickCountForCookie = 0;
                    let count = getTotalCookieGain();
                    for(let i=0; i<count; i++) setTimeout(spawnCookie, i*200);
                }
            }

            if (state.clickUpgrades[7].lvl > 0) {
                state.clickCountForEnergy++;
                if (state.clickCountForEnergy >= getRequiredEnergyClicks()) {
                    state.clickCountForEnergy = 0;
                    let batteryMult = Math.pow(2, state.energyUpgrades.find(u => u.id === 'e_battery').lvl);
                    
                    // Custom P3: Energy Bakery (Cookies boost energy gain)
                    let energyBakeryMult = 1 + (state.cookies * state.clickUpgrades.find(u => u.id === 'c3_multi').lvl * 0.02);
                    
                    let energyGain = (5 + (state.energyUpgrades[0].lvl * 2)) * batteryMult * energyBakeryMult;
                    state.energy += energyGain;
                    createFloat(window.innerWidth/2, window.innerHeight/2, `+${Math.floor(energyGain)} ⚡`, '#00d2ff');
                }
            }

            updateStats();
            let x = (e && (e.clientX || (e.touches && e.touches[0].clientX))) || window.innerWidth/2;
            let y = (e && (e.clientY || (e.touches && e.touches[0].clientY))) || window.innerHeight/2;
            createFloat(x, y, `+${Math.floor(val)}`, isCrit ? '#ffaa00' : 'var(--accent-color)');
        }

        function spawnCookie() {
            const c = document.createElement('div');
            c.className = 'falling-cookie';
            c.innerText = '🍪';
            c.style.position = 'absolute';
            c.style.fontSize = '4rem';
            c.style.cursor = 'pointer';
            c.style.zIndex = '100';
            c.style.left = Math.random() * 80 + 10 + 'vw';
            c.style.top = '-100px';
            c.style.filter = 'drop-shadow(0 0 15px #ffaa00)';
            c.animate([{ top: '-100px', transform: 'rotate(0deg)' }, { top: '110vh', transform: 'rotate(360deg)' }], { duration: 5500, easing: 'linear' });
            
            c.onclick = (e) => {
                let amount = 1 + state.cookieUpgrades[1].lvl;
                state.cookies += amount;
                createFloat(e.clientX, e.clientY, `+${amount} 🍪`, '#ffd700');
                updateStats();
                c.remove();
            };
            document.body.appendChild(c);
            setTimeout(() => { if(c.parentNode) c.remove(); }, 5600);
        }

        function buy(id) {
            let upgs = [...state.clickUpgrades, ...state.cookieUpgrades, ...state.energyUpgrades];
            const upg = upgs.find(u => u.id === id);
            const cost = getCost(upg);
            let currencyKey = (state.currentTab === 'clicks' ? 'clicks' : (state.currentTab === 'cookies' ? 'cookies' : 'energy'));
            
            if(state[currencyKey] >= cost && upg.lvl < upg.max) {
                state[currencyKey] -= cost;
                upg.lvl++;
                const cursorRelated = ['c2', 'c2_2', 'c1_2', 'c_ext1', 'c_ext2', 'c_ext4', 'c2_4', 'c3_2', 'c3_core'];
                if(cursorRelated.includes(id)) rebuildAuto();
                updateStats();
                renderUpgrades();
            }
        }

        function rebuildAuto() {
            const orbit = document.getElementById('orbit-center');
            orbit.innerHTML = '';
            const lvl = state.clickUpgrades.find(u => u.id === 'c2').lvl;
            const neuroLvl = state.clickUpgrades.find(u => u.id === 'c2_2').lvl;
            const coreLvl = state.clickUpgrades.find(u => u.id === 'c3_core').lvl;

            if(lvl === 0 && neuroLvl === 0 && coreLvl === 0) return;
            const colorEncoded = encodeURIComponent('#00ffff');
            
            // Visual cursors cap for performance
            const totalVisualCursors = Math.min(lvl + (neuroLvl > 0 ? 10 : 0) + (coreLvl * 5), 40);
            for(let i=0; i<totalVisualCursors; i++) {
                const w = document.createElement('div');
                w.className = 'cursor-wrapper';
                w.style.transform = `rotate(${(360/totalVisualCursors)*i}deg)`;
                const img = document.createElement('img');
                img.src = `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 28 28'><path d='M3 2 L10 25 L14 16 L23 12 Z' fill='${colorEncoded}' stroke='%23ffffff' stroke-width='1.5'/></svg>`;
                img.className = 'orbit-cursor'; img.style.top = '-160px';
                w.appendChild(img); orbit.appendChild(w);
            }
            if(autoInterval) clearInterval(autoInterval);
            autoInterval = setInterval(() => {
                state.clicks += state.autoIncomePerSec / 10;
                
                // Custom P3: Sand Storm (Auto-clicks spawn cookies)
                let storm = state.clickUpgrades.find(u => u.id === 'c3_storm').lvl;
                if(storm > 0 && Math.random() < 0.005 * storm) {
                    spawnCookie();
                }
                
                updateStats();
            }, 100);
        }

        function renderUpgrades() {
            listEl.innerHTML = '';
            let upgs; 
            let titleClass = "";
            let fillClass = "";
            let btnType = "";

            if(state.currentTab === 'clicks') { 
                upgs = state.clickUpgrades.filter(u => u.page === state.currentPage); 
                titleClass = "title-clicks";
                fillClass = "fill-clicks";
                btnType = "";
            }
            else if(state.currentTab === 'cookies') { 
                upgs = state.cookieUpgrades; 
                titleClass = "title-cookies";
                fillClass = "fill-cookies";
                btnType = "btn-cookies";
            }
            else { 
                upgs = state.energyUpgrades; 
                titleClass = "title-energy";
                fillClass = "fill-energy";
                btnType = "btn-energy";
            }

            upgs.forEach(u => {
                let cost = getCost(u);
                let isMax = u.lvl >= u.max;
                let formattedCost = cost.toLocaleString();
                let costClass = formattedCost.length > 5 ? 'long-number' : '';

                let card = document.createElement('div');
                card.className = 'upgrade-card';
                card.dataset.id = u.id;
                card.innerHTML = `
                    <div class="card-title ${titleClass}">
                        <span>${u.name}</span> 
                        <span>${u.lvl}/${u.max}</span>
                    </div>
                    <p class="card-desc">${u.desc}</p>
                    <div class="purchase-row">
                        <div class="purchase-progress-bg">
                            <div class="purchase-progress-fill ${fillClass}"></div>
                        </div>
                        <button class="upg-buy-btn ${btnType}" onclick="buy('${u.id}')">
                            <span class="buy-price ${isMax ? 'max-text' : costClass}">${isMax ? 'MAX' : formattedCost}</span>
                        </button>
                    </div>
                `;
                listEl.appendChild(card);
            });
            updateUpgVisuals();
        }

        function createFloat(x, y, t, c) {
            const f = document.createElement('div');
            f.className = 'floating-text'; f.innerText = t; f.style.left = x+'px'; f.style.top = y+'px'; f.style.color = c;
            document.body.appendChild(f); setTimeout(() => f.remove(), 800);
        }

        function createBg() {
            const container = document.getElementById('bg-particles');
            const icons = ['🍪', '⚡', '✨', '💎', '🚀', '🔥', '🌀', '🎮', '🦄', '🌈'];
            container.innerHTML = ''; 
            for(let i=0; i<40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerText = icons[Math.floor(Math.random()*icons.length)];
                p.style.left = Math.random()*100+'vw';
                p.style.animationDuration = (Math.random()*10+8)+'s';
                p.style.animationDelay = (Math.random()*10)+'s';
                container.appendChild(p);
            }
        }

        window.onload = () => { createBg(); updateStats(); rebuildAuto(); };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Неоновый Кликер: Энергия и Прокачка</title>
    <style>
        :root {
            --cursor-svg: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 28 28'><path d='M3 2 L10 25 L14 16 L23 12 Z' fill='%2300ffff' stroke='%23ffffff' stroke-width='1.5' stroke-linejoin='round'/></svg>");
            --bg-color: #0f0f13;
            --text-color: #ffffff;
            --accent-color: #00ffff;
            --cookie-color: #ffd700;
            --energy-color: #00d2ff;
            --panel-bg: rgba(15, 15, 25, 0.95);
        }

        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #0f0f13, #0a1128, #001f3f, #0f0f13);
            background-size: 400% 400%;
            animation: bgGradient 15s ease infinite;
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            user-select: none;
            cursor: var(--cursor-svg), auto;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }

        @keyframes bgGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .bg-particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .particle { position: absolute; font-size: 2rem; opacity: 0.15; animation: floatUp linear infinite; }
        @keyframes floatUp { 0% { transform: translateY(110vh) rotate(0deg); opacity: 0; } 50% { opacity: 0.3; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }

        .stats-top { position: absolute; top: 5%; display: flex; gap: 40px; z-index: 10; }
        .stat-box { text-align: center; }
        .stat-label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        .stat-value { font-size: 2.8rem; font-weight: 900; filter: drop-shadow(0 0 10px currentColor); }
        .clicks-val { color: var(--accent-color); }
        .cookies-val { color: var(--cookie-color); }
        .energy-val { color: var(--energy-color); }

        .game-area { position: relative; width: 450px; height: 450px; display: flex; align-items: center; justify-content: center; }
        .main-circle {
            position: relative; width: 240px; height: 240px; border-radius: 50%;
            background: linear-gradient(135deg, #00ffff, #0088ff, #00ccff, #0055ff, #00ffff);
            background-size: 400% 400%; animation: gradientBG 6s ease infinite;
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.4); border: 4px solid rgba(255, 255, 255, 0.2);
            z-index: 10; transition: transform 0.05s; cursor: pointer;
        }
        .main-circle:active, .main-circle.auto-clicked { transform: scale(0.94); }

        .orbit-container { position: absolute; top: 50%; left: 50%; width: 0; height: 0; z-index: 5; animation: globalRotation 20s linear infinite; }
        @keyframes globalRotation { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .cursor-wrapper { position: absolute; width: 0; height: 0; transform-origin: center center; }
        .orbit-cursor { position: absolute; width: 32px; height: 32px; transform: translate(-50%, -50%) rotate(315deg); filter: drop-shadow(0 0 8px var(--accent-color)); pointer-events: none; }

        .falling-cookie { position: absolute; font-size: 4rem; cursor: pointer; z-index: 100; filter: drop-shadow(0 0 20px #ffaa00); animation: fall linear forwards; }
        @keyframes fall { 0% { transform: translateY(-100px) rotate(0deg); } 100% { transform: translateY(110vh) rotate(360deg); } }

        .progress-stack {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; gap: 10px; z-index: 20; width: 400px;
        }
        .progress-wrapper {
            display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.6);
            padding: 8px 20px; border-radius: 30px; backdrop-filter: blur(10px);
            opacity: 0; transition: opacity 0.5s; pointer-events: none;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .progress-wrapper.active { opacity: 1; pointer-events: all; }
        
        .timer-text { font-family: monospace; font-weight: 900; font-size: 0.9rem; min-width: 80px; text-align: center; }
        .timer-cookie { color: var(--cookie-color); }
        .timer-energy { color: var(--energy-color); }
        
        .progress-container { flex: 1; height: 10px; background: rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; transition: width 0.1s; }
        .bar-cookie { background: linear-gradient(90deg, #ffd700, #ffaa00); box-shadow: 0 0 10px var(--cookie-color); }
        .bar-energy { background: linear-gradient(90deg, #00d2ff, #3a7bd5); box-shadow: 0 0 10px var(--energy-color); }

        .menu-btn { position: absolute; bottom: 40px; right: 40px; padding: 18px 36px; background: rgba(255,255,255,0.05); color: #fff; border: 2px solid var(--accent-color); border-radius: 50px; font-weight: 800; z-index: 50; cursor: pointer; transition: 0.3s; }
        .menu-btn:hover { background: var(--accent-color); color: #000; box-shadow: 0 0 25px var(--accent-color); }

        .upgrades-panel {
            position: absolute; top: 0; right: -100%; width: 450px; height: 100vh;
            background: var(--panel-bg); box-shadow: -20px 0 50px #000; z-index: 100;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; padding: 30px; backdrop-filter: blur(20px);
        }
        .upgrades-panel.open { right: 0; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: rgba(255,255,255,0.05); color: #888; border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .tab-btn.active { background: var(--accent-color); color: #000; }
        .tab-btn.active.cookie-tab { background: var(--cookie-color); color: #000; }
        .tab-btn.active.energy-tab { background: var(--energy-color); color: #000; }

        .upgrades-list { flex: 1; overflow-y: auto; padding-right: 5px; margin-bottom: 10px; }
        .upgrade-card { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); transition: opacity 0.2s; }
        .upgrade-card.disabled { opacity: 0.35; filter: grayscale(0.8); pointer-events: none; }
        .upg-cost { font-size: 1rem; font-weight: 900; color: #ffd700; }
        .upg-buy { float: right; padding: 8px 18px; border-radius: 12px; border: none; background: var(--accent-color); font-weight: 800; cursor: pointer; }
        .cookie-mode .upg-buy { background: var(--cookie-color); }
        .energy-mode .upg-buy { background: var(--energy-color); }

        /* Улучшенная пагинация */
        .pagination { 
            display: none; 
            justify-content: center; 
            gap: 20px; 
            margin-top: 5px; 
            padding: 20px 0 35px 0; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            background: linear-gradient(to top, rgba(0,0,0,0.2), transparent);
        }
        .page-btn { 
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.03); 
            border: 2px solid rgba(0, 255, 255, 0.3); 
            color: rgba(255, 255, 255, 0.6); 
            border-radius: 15px; 
            cursor: pointer; 
            font-weight: 900; 
            font-size: 1.2rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            backdrop-filter: blur(5px);
        }
        .page-btn:hover {
            border-color: var(--accent-color);
            color: white;
            background: rgba(0, 255, 255, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.2);
        }
        .page-btn.active { 
            background: var(--accent-color); 
            color: #000; 
            border-color: var(--accent-color);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5); 
            transform: scale(1.1);
        }

        .floating-text { position: fixed; pointer-events: none; z-index: 1000; font-weight: 900; font-size: 2.2rem; animation: floatText 0.8s ease-out forwards; }
        @keyframes floatText { 0% { transform: translateY(0) scale(1.2); opacity: 1; } 100% { transform: translateY(-150px) scale(1); opacity: 0; } }
    </style>
</head>
<body>

    <div class="bg-particles" id="bg-particles"></div>

    <div class="stats-top">
        <div class="stat-box">
            <div class="stat-label">Клики</div>
            <div class="stat-value clicks-val" id="clicks-display">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Печеньки</div>
            <div class="stat-value cookies-val" id="cookies-display">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Энергия</div>
            <div class="stat-value energy-val" id="energy-display">0</div>
        </div>
    </div>

    <div class="game-area">
        <div class="orbit-container" id="orbit-center"></div>
        <div class="main-circle" id="main-circle" onmousedown="handleClick(event)" ontouchstart="handleClick(event)"></div>
    </div>

    <div class="progress-stack">
        <div class="progress-wrapper" id="energy-progress-wrapper">
            <div class="timer-text timer-energy" id="energy-timer-text">0/100</div>
            <div class="progress-container"><div class="progress-bar bar-energy" id="energy-progress-bar"></div></div>
        </div>
        <div class="progress-wrapper" id="cookie-progress-wrapper">
            <div class="timer-text timer-cookie" id="cookie-timer-text">0/500</div>
            <div class="progress-container"><div class="progress-bar bar-cookie" id="cookie-progress-bar"></div></div>
        </div>
    </div>

    <button class="menu-btn" onclick="toggleMenu()">Магазин</button>

    <div class="upgrades-panel" id="upgrades-panel">
        <div class="panel-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="menu-title" style="margin:0; color:var(--accent-color)">Магазин</h2>
            <button onclick="toggleMenu()" style="background:none; border:none; color:#ff4444; font-size:2.5rem; cursor:pointer;">×</button>
        </div>
        <div class="tabs">
            <button class="tab-btn active" id="tab-clicks" onclick="switchTab('clicks', this)">Прокачка</button>
            <button class="tab-btn" id="tab-cookies" onclick="switchTab('cookies', this)">Пекарня</button>
            <button class="tab-btn" id="tab-energy" onclick="switchTab('energy', this)">Энергия</button>
        </div>
        <div class="upgrades-list" id="upgrades-list"></div>
        <div class="pagination" id="upgrade-pagination">
            <button class="page-btn active" id="pg-btn-1" onclick="changePage(1)">1</button>
            <button class="page-btn" id="pg-btn-2" onclick="changePage(2)">2</button>
        </div>
    </div>

    <script>
        let state = {
            clicks: 0,
            cookies: 0,
            energy: 0,
            currentTab: 'clicks',
            currentPage: 1,
            isMenuOpen: false,
            clickCountForCookie: 0,
            clickCountForEnergy: 0,
            clickUpgrades: [
                { id: 'c1', name: 'Сила клика', desc: 'Доход за клик +1.', base: 25, mult: 1.6, lvl: 0, max: 25, page: 1 },
                { id: 'c2', name: 'Авто-курсоры', desc: 'Кликают за вас.', base: 100, mult: 1.5, lvl: 0, max: 40, page: 1 },
                { id: 'cp', name: 'Печенька', desc: 'Активирует шкалу появления печенья.', base: 500, mult: 1, lvl: 0, max: 1, page: 1 },
                { id: 'c2x', name: 'Двойная сила', desc: 'Добавляет сразу +2 к силе клика.', base: 800, mult: 1.8, lvl: 0, max: 30, page: 1 },
                { id: 'cc', name: 'Мастер-кондитер', desc: 'Добавляет +1 печеньку за цикл шкалы.', base: 1000, mult: 2.0, lvl: 0, max: 50, page: 1 },
                { id: 'ce', name: 'Генератор', desc: 'Активирует шкалу энергии.', base: 1500, mult: 1, lvl: 0, max: 1, page: 1 },
                { id: 'c3', name: 'Крит. удар', desc: 'Шанс х5 очков.', base: 2500, mult: 2.2, lvl: 0, max: 20, page: 1 },
                
                // Страница 2
                { id: 'c2_1', name: 'Квантовый клик', desc: 'Доход за клик +10.', base: 5000, mult: 1.7, lvl: 0, max: 20, page: 2 },
                { id: 'c2_2', name: 'Нейросеть', desc: 'Кликает очень быстро (+5 за клик).', base: 8000, mult: 1.8, lvl: 0, max: 15, page: 2 },
                { id: 'c2_3', name: 'Фотонное поле', desc: 'Ускоряет авто-клики на 10%.', base: 12000, mult: 2.0, lvl: 0, max: 10, page: 2 },
                { id: 'c2_4', name: 'Сингулярность', desc: 'Глобальный множитель дохода x1.2.', base: 25000, mult: 2.5, lvl: 0, max: 5, page: 2 },
                { id: 'c2_5', name: 'Темная материя', desc: '1% шанс на бонус x100 за клик.', base: 50000, mult: 2.2, lvl: 0, max: 10, page: 2 },
                { id: 'c2_6', name: 'Временная петля', desc: 'Дает клики в секунду от кол-ва Энергии.', base: 75000, mult: 1.9, lvl: 0, max: 20, page: 2 },
                { id: 'c2_h1', name: 'Печенье-магнит', desc: 'Клик с шансом 10% дает 1-2 печеньки.', base: 30000, mult: 2.0, lvl: 0, max: 10, page: 2 },
                { id: 'c2_h2', name: 'Энерго-резонанс', desc: 'Клики мощнее от заполнения шкалы энергии.', base: 45000, mult: 1.8, lvl: 0, max: 15, page: 2 },
                { id: 'c2_h3', name: 'Триединство', desc: 'Дает 500 кликов каждые 10с (требует 🍪 и ⚡).', base: 100000, mult: 2.2, lvl: 0, max: 5, page: 2 }
            ],
            cookieUpgrades: [
                { id: 'k1', name: 'Ускоритель', desc: '-5 кликов для шкалы.', base: 5, mult: 2.0, lvl: 0, max: 90 },
                { id: 'k2', name: 'Сахарная пудра', desc: 'Больше печенек за раз.', base: 10, mult: 3.0, lvl: 0, max: 50 },
                { id: 'k3', name: 'Золотая выпечка', desc: 'Шанс на супер-печеньку.', base: 25, mult: 3.5, lvl: 0, max: 10 },
                { id: 'k4', name: 'Магнит', desc: 'Падают медленнее.', base: 50, mult: 4.0, lvl: 0, max: 5 },
                { id: 'k5', name: 'Конвейер', desc: 'Шанс 5% на x10 доход.', base: 100, mult: 2.0, lvl: 0, max: 10 }
            ],
            energyUpgrades: [
                { id: 'e1', name: 'Перегрузка', desc: 'При заполнении шкалы дает +2 энергии.', base: 50, mult: 1.5, lvl: 0, max: 20 },
                { id: 'e2', name: 'Энерго-клики', desc: 'Шанс 10% получить +100 кликов.', base: 150, mult: 1.6, lvl: 0, max: 10 },
                { id: 'e3', name: 'Статическое поле', desc: 'Энергия дает пассивные клики.', base: 300, mult: 1.8, lvl: 0, max: 10 },
                { id: 'e4', name: 'Импульс', desc: '-2 клика для шкалы энергии.', base: 500, mult: 1.7, lvl: 0, max: 20 },
                { id: 'e5', name: 'Сверхпроводник', desc: 'Все доходы умножаются на 1.1x.', base: 1000, mult: 2.5, lvl: 0, max: 5 }
            ]
        };

        const clicksEl = document.getElementById('clicks-display');
        const cookiesEl = document.getElementById('cookies-display');
        const energyEl = document.getElementById('energy-display');
        const listEl = document.getElementById('upgrades-list');
        const paginationEl = document.getElementById('upgrade-pagination');
        
        const cProgressEl = document.getElementById('cookie-progress-bar');
        const cTimerEl = document.getElementById('cookie-timer-text');
        const cWrapperEl = document.getElementById('cookie-progress-wrapper');

        const eProgressEl = document.getElementById('energy-progress-bar');
        const eTimerEl = document.getElementById('energy-timer-text');
        const eWrapperEl = document.getElementById('energy-progress-wrapper');

        let autoInterval;
        let trinityInterval;

        function toggleMenu() { 
            state.isMenuOpen = !state.isMenuOpen;
            document.getElementById('upgrades-panel').classList.toggle('open'); 
            if(state.isMenuOpen) renderUpgrades();
        }
        
        function switchTab(tab, btn) {
            state.currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'cookie-tab', 'energy-tab'));
            btn.classList.add('active');
            if(tab === 'cookies') btn.classList.add('cookie-tab');
            if(tab === 'energy') btn.classList.add('energy-tab');
            
            paginationEl.style.display = (tab === 'clicks') ? 'flex' : 'none';
            renderUpgrades();
        }

        function changePage(p) {
            state.currentPage = p;
            document.getElementById('pg-btn-1').classList.toggle('active', p === 1);
            document.getElementById('pg-btn-2').classList.toggle('active', p === 2);
            renderUpgrades();
            listEl.scrollTop = 0; 
        }

        const getCost = (u) => Math.floor(u.base * Math.pow(u.mult, u.lvl));
        const getRequiredCookieClicks = () => Math.max(50, 500 - (state.cookieUpgrades[0].lvl * 5));
        const getRequiredEnergyClicks = () => Math.max(20, 100 - (state.energyUpgrades[3].lvl * 2));

        function updateStats() {
            clicksEl.innerText = Math.floor(state.clicks).toLocaleString();
            cookiesEl.innerText = Math.floor(state.cookies).toLocaleString();
            energyEl.innerText = Math.floor(state.energy).toLocaleString();

            if (state.clickUpgrades[2].lvl > 0) {
                cWrapperEl.classList.add('active');
                let req = getRequiredCookieClicks();
                let cookieGain = 1 + state.clickUpgrades[4].lvl;
                cTimerEl.innerText = `${Math.floor(state.clickCountForCookie)}/${req} (+${cookieGain} 🍪)`;
                cProgressEl.style.width = Math.min(100, (state.clickCountForCookie / req) * 100) + '%';
            }

            if (state.clickUpgrades[5].lvl > 0) {
                eWrapperEl.classList.add('active');
                let req = getRequiredEnergyClicks();
                eTimerEl.innerText = `${Math.floor(state.clickCountForEnergy)}/${req}`;
                eProgressEl.style.width = Math.min(100, (state.clickCountForEnergy / req) * 100) + '%';
            }

            if(state.isMenuOpen) {
                updateUpgradeButtons();
            }
        }

        function updateUpgradeButtons() {
            let currency = (state.currentTab === 'clicks') ? state.clicks : (state.currentTab === 'cookies' ? state.cookies : state.energy);
            const cards = listEl.querySelectorAll('.upgrade-card');
            cards.forEach(card => {
                const cost = parseInt(card.dataset.cost);
                const isMax = card.dataset.max === "true";
                if (!isMax) {
                    if (currency < cost) {
                        card.classList.add('disabled');
                    } else {
                        card.classList.remove('disabled');
                    }
                }
            });
        }

        function handleClick(e) {
            if(e) e.preventDefault();
            
            let basePower = 1 + state.clickUpgrades[0].lvl + (state.clickUpgrades[3].lvl * 2) + (state.clickUpgrades[7].lvl * 10);
            
            if(state.clickUpgrades[14].lvl > 0) {
                let reqE = getRequiredEnergyClicks();
                let energyBonus = (state.clickCountForEnergy / reqE) * 2 * state.clickUpgrades[14].lvl;
                basePower += energyBonus;
            }

            let mult = Math.pow(1.1, state.energyUpgrades[4].lvl);
            mult *= Math.pow(1.2, state.clickUpgrades[10].lvl);
            
            let val = basePower * mult;
            let isCrit = Math.random() < (state.clickUpgrades[6].lvl * 0.05);
            if(isCrit) val *= 5;
            
            if(Math.random() < (state.clickUpgrades[11].lvl * 0.01)) {
                val *= 100;
                createFloat(window.innerWidth/2, 200, "ТЕМНАЯ МАТЕРИЯ! x100", "#ff00ff");
            }
            
            state.clicks += val;

            if(state.clickUpgrades[13].lvl > 0) {
                if(Math.random() < 0.10) {
                    let magAmt = 1 + (state.clickUpgrades[13].lvl > 5 ? 1 : 0);
                    state.cookies += magAmt;
                    createFloat(window.innerWidth/2, window.innerHeight/2 + 100, `+${magAmt} 🍪`, "#ffd700");
                }
            }

            if (state.clickUpgrades[2].lvl > 0) {
                state.clickCountForCookie += 1;
                if (state.clickCountForCookie >= getRequiredCookieClicks()) {
                    state.clickCountForCookie = 0;
                    let totalToSpawn = 1 + state.clickUpgrades[4].lvl;
                    for(let i=0; i < totalToSpawn; i++) setTimeout(spawnCookie, i * 150);
                }
            }

            if (state.clickUpgrades[5].lvl > 0) {
                state.clickCountForEnergy += 1;
                if (state.clickCountForEnergy >= getRequiredEnergyClicks()) {
                    state.clickCountForEnergy = 0;
                    let energyGain = 5 + (state.energyUpgrades[0].lvl * 2);
                    state.energy += energyGain;
                    createFloat(window.innerWidth/2, window.innerHeight/2 + 50, `+${energyGain} ⚡`, '#00d2ff');
                }
            }

            updateStats();
            let x = (e && (e.clientX || (e.touches && e.touches[0].clientX))) || window.innerWidth/2;
            let y = (e && (e.clientY || (e.touches && e.touches[0].clientY))) || window.innerHeight/2;
            createFloat(x, y, `+${Math.floor(val)}`, isCrit ? '#ffaa00' : '#00ffff');
        }

        function spawnCookie() {
            const c = document.createElement('div');
            c.className = 'falling-cookie';
            let isGold = Math.random() < (state.cookieUpgrades[2].lvl * 0.05);
            let isMega = Math.random() < (state.cookieUpgrades[4].lvl * 0.05);
            c.innerText = isMega ? '💎' : (isGold ? '🌟' : '🍪');
            c.style.left = Math.random() * 80 + 10 + 'vw';
            c.style.animationDuration = Math.max(2, 6 - (state.cookieUpgrades[3].lvl * 0.05)) + 's';
            c.onclick = (e) => {
                let amount = 1 + state.cookieUpgrades[1].lvl;
                if(isGold) amount *= 3; if(isMega) amount *= 10;
                state.cookies += amount;
                createFloat(e.clientX, e.clientY, `+${amount} 🍪`, isMega ? '#00ffff' : '#ffd700');
                updateStats();
                c.remove();
            };
            document.body.appendChild(c);
            setTimeout(() => { if(c.parentNode) c.remove(); }, 6000);
        }

        function buy(id) {
            let upgs; let currency;
            if(id.startsWith('c')) { upgs = state.clickUpgrades; currency = state.clicks; }
            else if(id.startsWith('k')) { upgs = state.cookieUpgrades; currency = state.cookies; }
            else { upgs = state.energyUpgrades; currency = state.energy; }

            const upg = upgs.find(u => u.id === id);
            const cost = getCost(upg);

            if(currency >= cost && upg.lvl < upg.max) {
                if(id.startsWith('c')) state.clicks -= cost;
                else if(id.startsWith('k')) state.cookies -= cost;
                else state.energy -= cost;
                upg.lvl++;
                
                if(id === 'c2' || id === 'c2_2' || id === 'c2_3') rebuildAuto();
                if(id === 'c2_h3') startTrinity();
                
                updateStats();
                renderUpgrades();
            }
        }

        function startTrinity() {
            if(trinityInterval) clearInterval(trinityInterval);
            trinityInterval = setInterval(() => {
                if(state.cookies > 0 && state.energy > 0) {
                    let bonus = 500 * state.clickUpgrades[15].lvl;
                    state.clicks += bonus;
                    createFloat(window.innerWidth/2, 100, `ТРИЕДИНСТВО +${bonus}`, "#ffffff");
                    updateStats();
                }
            }, 10000);
        }

        function rebuildAuto() {
            const orbit = document.getElementById('orbit-center');
            orbit.innerHTML = '';
            const lvl = state.clickUpgrades[1].lvl;
            const neuroLvl = state.clickUpgrades[8].lvl;
            if(lvl === 0 && neuroLvl === 0) return;
            
            for(let i=0; i<lvl; i++) {
                const w = document.createElement('div');
                w.className = 'cursor-wrapper';
                w.style.transform = `rotate(${(360/lvl)*i}deg)`;
                const img = document.createElement('img');
                img.src = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 28 28'><path d='M3 2 L10 25 L14 16 L23 12 Z' fill='%2300ffff' stroke='%23ffffff' stroke-width='1.5'/></svg>";
                img.className = 'orbit-cursor'; img.style.top = '-160px';
                w.appendChild(img); orbit.appendChild(w);
            }
            
            if(autoInterval) clearInterval(autoInterval);
            let baseSpeed = Math.max(1, lvl/3) + (neuroLvl * 2);
            let speedFactor = 1 + (state.clickUpgrades[9].lvl * 0.1);
            let finalInterval = 1000 / (baseSpeed * speedFactor);

            autoInterval = setInterval(() => {
                let mult = Math.pow(1.1, state.energyUpgrades[4].lvl);
                mult *= Math.pow(1.2, state.clickUpgrades[10].lvl);
                let autoPower = (1 + state.clickUpgrades[0].lvl * 0.2 + (state.clickUpgrades[3].lvl * 0.4) + (neuroLvl * 5)) * mult;
                state.clicks += autoPower;
                
                if(state.clickUpgrades[12].lvl > 0) state.clicks += (state.energy * 0.05 * state.clickUpgrades[12].lvl);

                if(state.clickUpgrades[2].lvl > 0) {
                    state.clickCountForCookie += 0.2;
                    if(state.clickCountForCookie >= getRequiredCookieClicks()) { 
                        state.clickCountForCookie = 0; 
                        let totalToSpawn = 1 + state.clickUpgrades[4].lvl;
                        for(let i=0; i < totalToSpawn; i++) spawnCookie();
                    }
                }
                if(state.clickUpgrades[5].lvl > 0) {
                    state.clickCountForEnergy += 0.2;
                    if(state.clickCountForEnergy >= getRequiredEnergyClicks()) { 
                        state.clickCountForEnergy = 0; 
                        state.energy += 5 + (state.energyUpgrades[0].lvl * 2);
                    }
                }
                updateStats();
            }, finalInterval);
        }

        function renderUpgrades() {
            listEl.innerHTML = '';
            const panel = document.getElementById('upgrades-panel');
            panel.classList.remove('cookie-mode', 'energy-mode');
            let upgs; let currency; let curSuffix = "";

            if(state.currentTab === 'clicks') { 
                upgs = state.clickUpgrades.filter(u => u.page === state.currentPage); 
                currency = state.clicks; 
                paginationEl.style.display = 'flex';
            }
            else if(state.currentTab === 'cookies') { 
                upgs = state.cookieUpgrades; currency = state.cookies; 
                panel.classList.add('cookie-mode'); curSuffix = " 🍪";
                paginationEl.style.display = 'none';
            } else { 
                upgs = state.energyUpgrades; currency = state.energy; 
                panel.classList.add('energy-mode'); curSuffix = " ⚡";
                paginationEl.style.display = 'none';
            }

            upgs.forEach(u => {
                let cost = getCost(u);
                let isMax = u.lvl >= u.max;
                let card = document.createElement('div');
                card.className = `upgrade-card ${currency < cost && !isMax ? 'disabled' : ''}`;
                card.dataset.cost = cost;
                card.dataset.max = isMax;
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between"><b>${u.name}</b> <span>${u.lvl}/${u.max}</span></div>
                    <p style="font-size:0.8rem; color:#aaa; margin:5px 0">${u.desc}</p>
                    <div style="margin-top:10px">
                        <span class="upg-cost" style="color:${state.currentTab === 'energy' ? 'var(--energy-color)' : (state.currentTab === 'cookies' ? 'var(--cookie-color)' : 'var(--accent-color)')}">${isMax ? 'МАКС' : cost.toLocaleString() + curSuffix}</span>
                        <button class="upg-buy" onclick="buy('${u.id}')">${isMax ? 'MAX' : 'Купить'}</button>
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        function createFloat(x, y, t, c) {
            const f = document.createElement('div');
            f.className = 'floating-text'; f.innerText = t; f.style.left = x+'px'; f.style.top = y+'px'; f.style.color = c;
            f.style.textShadow = `0 0 10px ${c}`;
            document.body.appendChild(f); setTimeout(() => f.remove(), 800);
        }

        function createBg() {
            const container = document.getElementById('bg-particles');
            const items = ['✨','⚡','🌟','🔹','❄️'];
            for(let i=0; i<25; i++) {
                const p = document.createElement('div');
                p.className = 'particle'; p.innerText = items[Math.floor(Math.random()*items.length)];
                p.style.left = Math.random()*100+'vw'; p.style.animationDuration = (Math.random()*10+5)+'s';
                container.appendChild(p);
            }
        }

        window.onload = () => { createBg(); updateStats(); };
    </script>
</body>
</html>
